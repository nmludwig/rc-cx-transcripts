<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Error — RingCentral ACE</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'DM Sans',sans-serif;background:#F7F8FA;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}
.box{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,0.1);padding:40px;max-width:480px;text-align:center}
.icon{font-size:40px;margin-bottom:16px}
h1{font-size:20px;font-weight:600;color:#111;margin-bottom:8px}
p{font-size:14px;color:#666;margin-bottom:24px}
a{display:inline-block;background:#FF6A00;color:#fff;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px}
a:hover{background:#CC5300}
</style>
</head>
<body>
<div class="box">
  <div class="icon">⚠️</div>
  <h1>Something went wrong</h1>
  <p>{{ message }}</p>
  <a href="/">Try Again</a>
</div>
</body>
</html>
